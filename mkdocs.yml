site_name: AlterSeeK-Path
site_description: User guide for altermagnetic k-point path generation.
site_url: https://yujia-teng.github.io/AlterSeeK-Path/
repo_url: https://github.com/yujia-teng/AlterSeeK-Path
repo_name: yujia-teng/AlterSeeK-Path

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: blue

nav:
  - User Guide: index.md
  - Installation: installation.md
  - Workflow: workflow.md
  - Plotting: plotting.md
  - Examples: examples.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
